services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: motorhome
      POSTGRES_USER: motorhome
      POSTGRES_PASSWORD: motorhome
    ports:
      - "5433:5432"
    volumes:
      - motorhome_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U motorhome"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  motorhome_pg_data:
